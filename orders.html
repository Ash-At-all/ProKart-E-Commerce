<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders — ProKart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.1/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --bg-dark: #080c14;
    --bg-card: #0e1420;
    --bg-card2: #111827;
    --accent: #00e5ff;
    --accent2: #7b2fff;
    --text: #e8eaf6;
    --text-muted: #8892a4;
    --border: rgba(0,229,255,0.12);
    --glow: 0 0 24px rgba(0,229,255,0.18);
    --success: #00e676;
    --error: #ef5350;
    --warning: #ffc107;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg-dark); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-dark); }
  ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

  /* NAVBAR */
  .navbar {
    background: rgba(8,12,20,0.95);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 14px 0;
    position: sticky; top: 0; z-index: 1000;
  }
  .navbar-brand {
    font-family: 'Orbitron', monospace;
    font-weight: 900; font-size: 1.5rem;
    color: var(--accent) !important;
    letter-spacing: 2px; text-decoration: none;
  }
  .navbar-brand span { color: var(--accent2); }
  .back-btn {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text-muted); border-radius: 8px;
    padding: 7px 16px; font-family: 'Syne', sans-serif;
    font-weight: 600; font-size: 0.83rem; cursor: pointer;
    transition: all 0.2s; text-decoration: none;
    display: inline-flex; align-items: center; gap: 7px;
  }
  .back-btn:hover { border-color: var(--accent); color: var(--accent); }

  /* PAGE HEADER */
  .page-header {
    padding: 48px 0 32px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 40px;
    background: radial-gradient(ellipse 60% 40% at 50% 0%, rgba(0,229,255,0.05), transparent);
  }
  .page-tag {
    font-size: 0.72rem; font-weight: 700;
    letter-spacing: 4px; text-transform: uppercase;
    color: var(--accent); margin-bottom: 10px; display: block;
  }
  .page-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.6rem, 3vw, 2.2rem);
    font-weight: 900; margin-bottom: 8px;
  }
  .page-sub { color: var(--text-muted); font-size: 0.9rem; }

  /* FILTER TABS */
  .filter-tabs {
    display: flex; gap: 10px; flex-wrap: wrap;
    margin-bottom: 28px;
  }
  .tab-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted); border-radius: 8px;
    padding: 8px 20px; font-family: 'Syne', sans-serif;
    font-size: 0.8rem; font-weight: 600;
    letter-spacing: 1px; cursor: pointer;
    transition: all 0.2s; text-transform: uppercase;
  }
  .tab-btn:hover, .tab-btn.active {
    background: rgba(0,229,255,0.08);
    border-color: var(--accent); color: var(--accent);
  }

  /* ORDER CARD */
  .order-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    margin-bottom: 20px;
    overflow: hidden;
    transition: all 0.3s;
    animation: fadeUp 0.4s ease forwards;
    opacity: 0;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .order-card:hover { border-color: rgba(0,229,255,0.25); box-shadow: var(--glow); }

  /* ORDER HEADER */
  .order-header {
    display: flex; align-items: center;
    justify-content: space-between;
    flex-wrap: wrap; gap: 12px;
    padding: 22px 28px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,229,255,0.02);
  }
  .order-id {
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem; font-weight: 700;
    color: var(--accent);
  }
  .order-meta {
    display: flex; align-items: center;
    gap: 20px; flex-wrap: wrap;
  }
  .order-meta-item {
    display: flex; align-items: center;
    gap: 6px; font-size: 0.78rem;
    color: var(--text-muted);
  }
  .order-meta-item i { color: var(--accent2); font-size: 0.75rem; }

  /* STATUS BADGE */
  .status-badge {
    display: inline-flex; align-items: center;
    gap: 6px; padding: 5px 14px;
    border-radius: 20px; font-size: 0.72rem;
    font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase;
  }
  .status-badge::before {
    content: ''; width: 6px; height: 6px;
    border-radius: 50%; background: currentColor;
    animation: pulse-dot 1.5s infinite;
  }
  @keyframes pulse-dot {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .status-confirmed {
    background: rgba(0,230,118,0.1);
    border: 1px solid rgba(0,230,118,0.25);
    color: var(--success);
  }
  .status-processing {
    background: rgba(255,193,7,0.1);
    border: 1px solid rgba(255,193,7,0.25);
    color: var(--warning);
  }
  .status-shipped {
    background: rgba(0,229,255,0.1);
    border: 1px solid rgba(0,229,255,0.25);
    color: var(--accent);
  }
  .status-delivered {
    background: rgba(123,47,255,0.1);
    border: 1px solid rgba(123,47,255,0.25);
    color: var(--accent2);
  }
  .status-cancelled {
    background: rgba(239,83,80,0.1);
    border: 1px solid rgba(239,83,80,0.25);
    color: var(--error);
  }

  /* ORDER BODY */
  .order-body { padding: 24px 28px; }

  /* ITEMS LIST */
  .order-items-list { margin-bottom: 20px; }
  .order-item-row {
    display: flex; align-items: center;
    gap: 14px; padding: 12px 0;
    border-bottom: 1px solid rgba(0,229,255,0.04);
  }
  .order-item-row:last-child { border-bottom: none; }
  .item-thumb {
    width: 52px; height: 52px;
    background: linear-gradient(135deg, #0a1020, #111827);
    border-radius: 10px;
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem; flex-shrink: 0;
    overflow: hidden;
  }
  .item-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .item-details { flex: 1; }
  .item-name { font-weight: 700; font-size: 0.88rem; margin-bottom: 3px; }
  .item-qty { color: var(--text-muted); font-size: 0.75rem; }
  .item-price {
    font-family: 'Orbitron', monospace;
    font-size: 0.88rem; font-weight: 700;
    color: var(--accent); flex-shrink: 0;
  }

  /* Collapsed items */
  .items-collapsed { display: none; }
  .items-collapsed.show { display: block; }
  .show-more-btn {
    background: none; border: none;
    color: var(--accent); font-size: 0.78rem;
    font-weight: 700; cursor: pointer;
    font-family: 'Syne', sans-serif;
    padding: 4px 0; letter-spacing: 1px;
    transition: opacity 0.2s;
  }
  .show-more-btn:hover { opacity: 0.7; }

  /* ORDER FOOTER */
  .order-footer {
    display: flex; align-items: center;
    justify-content: space-between;
    flex-wrap: wrap; gap: 14px;
    padding: 18px 28px;
    border-top: 1px solid var(--border);
    background: rgba(0,0,0,0.15);
  }
  .order-total-label { color: var(--text-muted); font-size: 0.82rem; }
  .order-total-price {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem; font-weight: 900; color: var(--accent);
  }
  .order-actions { display: flex; gap: 10px; flex-wrap: wrap; }

  .btn-action {
    border-radius: 8px; padding: 8px 18px;
    font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 0.78rem;
    letter-spacing: 1px; cursor: pointer;
    transition: all 0.2s; text-transform: uppercase;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-cancel {
    background: transparent;
    border: 1.5px solid rgba(239,83,80,0.4);
    color: var(--error);
  }
  .btn-cancel:hover {
    background: rgba(239,83,80,0.08);
    border-color: var(--error);
  }
  .btn-track {
    background: rgba(0,229,255,0.08);
    border: 1.5px solid rgba(0,229,255,0.3);
    color: var(--accent);
  }
  .btn-track:hover { background: rgba(0,229,255,0.15); }
  .btn-reorder {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text-muted);
  }
  .btn-reorder:hover { border-color: var(--accent2); color: var(--accent2); }

  /* DELIVERY PROGRESS */
  .delivery-progress {
    margin: 0 0 20px;
    padding: 20px;
    background: rgba(0,229,255,0.03);
    border: 1px solid var(--border);
    border-radius: 12px;
  }
  .progress-steps {
    display: flex; align-items: center;
    justify-content: space-between;
    position: relative;
  }
  .progress-steps::before {
    content: ''; position: absolute;
    top: 18px; left: 18px; right: 18px;
    height: 2px; background: var(--border); z-index: 0;
  }
  .progress-fill {
    position: absolute;
    top: 18px; left: 18px;
    height: 2px; background: var(--accent);
    z-index: 1; transition: width 0.5s ease;
  }
  .prog-step {
    display: flex; flex-direction: column;
    align-items: center; gap: 8px;
    position: relative; z-index: 2;
  }
  .prog-dot {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--bg-card);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; color: var(--text-muted);
    transition: all 0.3s;
  }
  .prog-step.done .prog-dot {
    border-color: var(--success);
    background: rgba(0,230,118,0.1);
    color: var(--success);
  }
  .prog-step.active .prog-dot {
    border-color: var(--accent);
    background: rgba(0,229,255,0.1);
    color: var(--accent);
    box-shadow: 0 0 12px rgba(0,229,255,0.3);
  }
  .prog-label {
    font-size: 0.65rem; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--text-muted); text-align: center;
  }
  .prog-step.done .prog-label,
  .prog-step.active .prog-label { color: var(--accent); }

  /* EMPTY STATE */
  .empty-orders {
    text-align: center; padding: 100px 20px;
    color: var(--text-muted);
  }
  .empty-orders-icon {
    font-size: 5rem; color: rgba(0,229,255,0.1);
    display: block; margin-bottom: 24px;
  }
  .empty-orders h4 {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem; color: var(--text);
    margin-bottom: 12px;
  }
  .empty-orders p { font-size: 0.9rem; margin-bottom: 28px; }
  .btn-shop {
    background: linear-gradient(135deg, var(--accent), #00b8d9);
    border: none; border-radius: 10px;
    padding: 13px 32px; color: var(--bg-dark);
    font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 0.9rem;
    cursor: pointer; letter-spacing: 1px;
    text-transform: uppercase; text-decoration: none;
    display: inline-block;
    box-shadow: 0 0 24px rgba(0,229,255,0.25);
    transition: all 0.2s;
  }
  .btn-shop:hover { transform: translateY(-2px); color: var(--bg-dark); }

  /* CANCEL MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 9998; display: none;
    align-items: center; justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: var(--bg-card2);
    border: 1px solid rgba(239,83,80,0.25);
    border-radius: 20px; padding: 36px;
    max-width: 440px; width: 100%;
    animation: pop-in 0.3s cubic-bezier(0.175,0.885,0.32,1.275);
  }
  @keyframes pop-in {
    from { transform: scale(0.85); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .modal-icon {
    width: 64px; height: 64px; border-radius: 50%;
    background: rgba(239,83,80,0.1);
    border: 2px solid rgba(239,83,80,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem; color: var(--error);
    margin: 0 auto 20px;
  }
  .modal-title {
    font-family: 'Orbitron', monospace;
    font-size: 1rem; font-weight: 700;
    text-align: center; margin-bottom: 10px;
  }
  .modal-sub {
    color: var(--text-muted); font-size: 0.85rem;
    text-align: center; line-height: 1.6; margin-bottom: 24px;
  }
  .modal-order-id {
    background: rgba(239,83,80,0.05);
    border: 1px solid rgba(239,83,80,0.15);
    border-radius: 8px; padding: 10px 16px;
    font-family: 'Orbitron', monospace;
    font-size: 0.8rem; color: var(--error);
    text-align: center; margin-bottom: 20px;
  }
  .cancel-reason {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px;
    color: var(--text); font-family: 'Syne', sans-serif;
    font-size: 0.85rem; outline: none;
    margin-bottom: 20px;
  }
  .cancel-reason:focus { border-color: var(--error); }
  .modal-actions { display: flex; gap: 12px; }
  .btn-modal-cancel {
    flex: 1; background: linear-gradient(135deg, #ef5350, #c62828);
    border: none; border-radius: 10px; padding: 13px;
    color: #fff; font-family: 'Syne', sans-serif;
    font-weight: 800; font-size: 0.85rem; cursor: pointer;
    letter-spacing: 1px; text-transform: uppercase;
    transition: all 0.2s;
  }
  .btn-modal-cancel:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-modal-keep {
    flex: 1; background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 10px; padding: 13px;
    color: var(--text-muted); font-family: 'Syne', sans-serif;
    font-weight: 700; font-size: 0.85rem; cursor: pointer;
    text-transform: uppercase; transition: all 0.2s;
  }
  .btn-modal-keep:hover { border-color: var(--accent); color: var(--accent); }

  /* STATS BAR */
  .stats-bar {
    display: flex; gap: 16px; flex-wrap: wrap;
    margin-bottom: 32px;
  }
  .stat-pill {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 20px;
    display: flex; align-items: center; gap: 10px;
    flex: 1; min-width: 120px;
  }
  .stat-pill i { color: var(--accent); font-size: 1rem; }
  .stat-pill-num {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem; font-weight: 700; color: var(--accent);
  }
  .stat-pill-label { color: var(--text-muted); font-size: 0.72rem; letter-spacing: 1px; text-transform: uppercase; }

  /* Toast */
  .toast-msg {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: rgba(0,229,255,0.12);
    border: 1px solid rgba(0,229,255,0.3);
    color: var(--accent); padding: 12px 26px;
    border-radius: 8px; font-weight: 700; font-size: 0.85rem;
    z-index: 9999; transition: transform 0.35s;
    pointer-events: none; backdrop-filter: blur(10px);
  }
  .toast-msg.show { transform: translateX(-50%) translateY(0); }

  /* Search bar */
  .orders-search-wrap {
    position: relative;
    max-width: 400px;
    margin-bottom: 24px;
  }
  .orders-search-wrap i {
    position: absolute; left: 14px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted); font-size: 0.85rem;
    pointer-events: none;
  }
  .orders-search-wrap input {
    width: 100%;
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 14px 11px 38px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.88rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .orders-search-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,255,0.08);
  }
  .orders-search-wrap input::placeholder { color: var(--text-muted); }

  /* Back to top */
  #backToTop {
    position: fixed; bottom: 28px; right: 28px;
    width: 46px; height: 46px;
    background: linear-gradient(135deg, var(--accent), #00b8d9);
    color: var(--bg-dark);
    border: none; border-radius: 12px;
    font-size: 1.1rem; cursor: pointer;
    box-shadow: 0 0 20px rgba(0,229,255,0.3);
    transition: all 0.3s;
    opacity: 0; pointer-events: none;
    z-index: 1500;
    display: flex; align-items: center; justify-content: center;
  }
  #backToTop.visible { opacity: 1; pointer-events: all; }
  #backToTop:hover { transform: translateY(-3px); }

  @media (max-width: 768px) {
    .order-header { padding: 16px 18px; }
    .order-body { padding: 18px 18px; }
    .order-footer { padding: 14px 18px; }
    .progress-steps::before { top: 14px; }
    .progress-fill { top: 14px; }
    .prog-dot { width: 28px; height: 28px; font-size: 0.7rem; }
    .prog-label { display: none; }
  }
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="container d-flex align-items-center justify-content-between">
    <a class="navbar-brand" href="index.html">KART<span>PRO</span></a>
    <a class="back-btn" href="index.html">
      <i class="fas fa-arrow-left"></i> Back to Shop
    </a>
  </div>
</nav>

<!-- PAGE HEADER -->
<div class="page-header">
  <div class="container">
    <span class="page-tag">Account</span>
    <h1 class="page-title">My Orders</h1>
    <p class="page-sub">Track, manage and view your order history</p>
  </div>
</div>

<div class="container pb-5">

  <!-- STATS BAR -->
  <div class="stats-bar" id="statsBar" style="display:none">
    <div class="stat-pill">
      <i class="fas fa-box"></i>
      <div>
        <div class="stat-pill-num" id="statTotal">0</div>
        <div class="stat-pill-label">Total Orders</div>
      </div>
    </div>
    <div class="stat-pill">
      <i class="fas fa-check-circle" style="color:var(--success)"></i>
      <div>
        <div class="stat-pill-num" id="statDelivered" style="color:var(--success)">0</div>
        <div class="stat-pill-label">Delivered</div>
      </div>
    </div>
    <div class="stat-pill">
      <i class="fas fa-clock" style="color:var(--warning)"></i>
      <div>
        <div class="stat-pill-num" id="statActive" style="color:var(--warning)">0</div>
        <div class="stat-pill-label">Active</div>
      </div>
    </div>
    <div class="stat-pill">
      <i class="fas fa-times-circle" style="color:var(--error)"></i>
      <div>
        <div class="stat-pill-num" id="statCancelled" style="color:var(--error)">0</div>
        <div class="stat-pill-label">Cancelled</div>
      </div>
    </div>
  </div>

  <!-- SEARCH BAR -->
  <div class="orders-search-wrap" id="ordersSearchWrap" style="display:none">
    <i class="fas fa-search"></i>
    <input type="text" id="ordersSearch" placeholder="Search by Order ID or product…" oninput="liveSearchOrders(this.value)">
  </div>

  <!-- FILTER TABS -->
  <div class="filter-tabs" id="filterTabs" style="display:none">
    <button class="tab-btn active" onclick="filterOrders('all', this)">All Orders</button>
    <button class="tab-btn" onclick="filterOrders('Confirmed', this)">Confirmed</button>
    <button class="tab-btn" onclick="filterOrders('Processing', this)">Processing</button>
    <button class="tab-btn" onclick="filterOrders('Shipped', this)">Shipped</button>
    <button class="tab-btn" onclick="filterOrders('Delivered', this)">Delivered</button>
    <button class="tab-btn" onclick="filterOrders('Cancelled', this)">Cancelled</button>
  </div>

  <!-- ORDERS LIST -->
  <div id="ordersList"></div>

</div>

<!-- CANCEL MODAL -->
<div class="modal-overlay" id="cancelModal">
  <div class="modal-box">
    <div class="modal-icon"><i class="fas fa-times"></i></div>
    <div class="modal-title">Cancel Order?</div>
    <p class="modal-sub">Are you sure you want to cancel this order? This action cannot be undone.</p>
    <div class="modal-order-id" id="modalOrderId">ORDER #PKT-000000</div>
    <select class="cancel-reason" id="cancelReason">
      <option value="">Select reason (optional)</option>
      <option>Changed my mind</option>
      <option>Found a better price elsewhere</option>
      <option>Ordered by mistake</option>
      <option>Delivery time too long</option>
      <option>Product no longer needed</option>
      <option>Other</option>
    </select>
    <div class="modal-actions">
      <button class="btn-modal-keep" onclick="closeModal()">
        <i class="fas fa-arrow-left me-1"></i> Keep Order
      </button>
      <button class="btn-modal-cancel" onclick="confirmCancel()">
        <i class="fas fa-times me-1"></i> Yes, Cancel
      </button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast-msg" id="toast"></div>

<!-- Back to Top -->
<button id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="Back to top"><i class="fas fa-arrow-up"></i></button>

<script>
let allOrders = [];
let cancelTargetId = null;

const STATUS_STEPS = {
  'Confirmed':  1,
  'Processing': 2,
  'Shipped':    3,
  'Delivered':  4,
  'Cancelled':  0
};

const PROG_STAGES = [
  { icon: 'fas fa-check-circle', label: 'Confirmed' },
  { icon: 'fas fa-cog', label: 'Processing' },
  { icon: 'fas fa-truck', label: 'Shipped' },
  { icon: 'fas fa-home', label: 'Delivered' },
];

// ── LOAD ORDERS ──────────────────────────────────────────
function loadOrders() {
  const raw = localStorage.getItem('prokart_orders');
  allOrders = raw ? JSON.parse(raw) : [];
  renderStats();
  renderOrders(allOrders);

  if (allOrders.length > 0) {
    document.getElementById('statsBar').style.display = 'flex';
    document.getElementById('filterTabs').style.display = 'flex';
    document.getElementById('ordersSearchWrap').style.display = 'block';
  }

  // Back to top
  const btt = document.getElementById('backToTop');
  if (btt) {
    window.addEventListener('scroll', () => {
      btt.classList.toggle('visible', window.scrollY > 300);
    }, { passive: true });
  }
}

// ── LIVE SEARCH ──────────────────────────────────────────
function liveSearchOrders(q) {
  q = q.toLowerCase().trim();
  if (!q) { renderOrders(allOrders); return; }
  const filtered = allOrders.filter(o => {
    const idMatch = (o.id || '').toLowerCase().includes(q);
    const itemMatch = (o.items || []).some(i => (i.name || '').toLowerCase().includes(q));
    return idMatch || itemMatch;
  });
  renderOrders(filtered);
}

// ── STATS ────────────────────────────────────────────────
function renderStats() {
  document.getElementById('statTotal').textContent = allOrders.length;
  document.getElementById('statDelivered').textContent = allOrders.filter(o => o.status === 'Delivered').length;
  document.getElementById('statActive').textContent = allOrders.filter(o => ['Confirmed','Processing','Shipped'].includes(o.status)).length;
  document.getElementById('statCancelled').textContent = allOrders.filter(o => o.status === 'Cancelled').length;
}

// ── RENDER ORDERS ────────────────────────────────────────
function renderOrders(orders) {
  const container = document.getElementById('ordersList');

  if (!orders || orders.length === 0) {
    container.innerHTML = `
      <div class="empty-orders">
        <i class="fas fa-box-open empty-orders-icon"></i>
        <h4>No Orders Yet</h4>
        <p>You haven't placed any orders. Start shopping now!</p>
        <a href="index.html#products" class="btn-shop">
          <i class="fas fa-shopping-cart me-2"></i> Shop Now
        </a>
      </div>`;
    return;
  }

  container.innerHTML = orders.map((order, idx) => buildOrderCard(order, idx)).join('');
}

function buildOrderCard(order, idx) {
  const statusClass = 'status-' + (order.status || 'confirmed').toLowerCase();
  const stepNum = STATUS_STEPS[order.status] || 1;
  const isCancelled = order.status === 'Cancelled';
  const canCancel = !isCancelled && order.status !== 'Delivered';

  // Items — show first 2, collapse rest
  const items = order.items || [];
  const firstTwo = items.slice(0, 2);
  const rest = items.slice(2);

  const itemsHtml = firstTwo.map(item => itemRow(item)).join('');
  const restHtml = rest.length > 0 ? `
    <div class="items-collapsed" id="rest-${order.id}">
      ${rest.map(item => itemRow(item)).join('')}
    </div>
    <button class="show-more-btn" onclick="toggleItems('${order.id}', this)">
      <i class="fas fa-chevron-down me-1"></i> +${rest.length} more item${rest.length > 1 ? 's' : ''}
    </button>` : '';

  // Delivery progress (skip if cancelled)
  const progressHtml = !isCancelled ? buildProgress(stepNum) : `
    <div style="background:rgba(239,83,80,0.05);border:1px solid rgba(239,83,80,0.15);border-radius:10px;padding:14px 18px;display:flex;align-items:center;gap:10px;margin-bottom:20px;">
      <i class="fas fa-times-circle" style="color:var(--error);font-size:1.1rem"></i>
      <div>
        <div style="font-weight:700;font-size:0.85rem;color:var(--error);">Order Cancelled</div>
        <div style="color:var(--text-muted);font-size:0.78rem;">${order.cancelReason ? 'Reason: ' + order.cancelReason : 'This order has been cancelled'}</div>
      </div>
    </div>`;

  const paymentIcon = { CARD:'fas fa-credit-card', UPI:'fas fa-mobile-alt', NETBANKING:'fas fa-university', COD:'fas fa-money-bill-wave' };

  return `
  <div class="order-card" style="animation-delay:${idx * 0.08}s">
    <div class="order-header">
      <div>
        <div class="order-id"><i class="fas fa-hashtag me-1" style="font-size:0.75rem"></i>${order.id || 'PKT-UNKNOWN'}</div>
        <div class="order-meta mt-2">
          <div class="order-meta-item"><i class="fas fa-calendar-alt"></i>${order.date || 'N/A'}</div>
          <div class="order-meta-item"><i class="${paymentIcon[order.payment] || 'fas fa-wallet'}"></i>${order.payment || 'N/A'}</div>
          <div class="order-meta-item"><i class="fas fa-box"></i>${(order.items || []).length} item${(order.items||[]).length !== 1 ? 's' : ''}</div>
        </div>
      </div>
      <span class="status-badge ${statusClass}">${order.status || 'Confirmed'}</span>
    </div>

    <div class="order-body">
      ${progressHtml}
      <div class="order-items-list">
        ${itemsHtml}
        ${restHtml}
      </div>
      ${order.address ? `<div style="display:flex;align-items:flex-start;gap:8px;padding:12px 0;border-top:1px solid rgba(0,229,255,0.05);">
        <i class="fas fa-map-marker-alt" style="color:var(--accent2);margin-top:2px;font-size:0.8rem;flex-shrink:0"></i>
        <span style="color:var(--text-muted);font-size:0.8rem;">${order.address}</span>
      </div>` : ''}
    </div>

    <div class="order-footer">
      <div>
        <div class="order-total-label">Total Paid</div>
        <div class="order-total-price">${order.total || '₹0'}</div>
      </div>
      <div class="order-actions">
        ${canCancel ? `<button class="btn-action btn-cancel" onclick="openCancelModal('${order.id}')">
          <i class="fas fa-times"></i> Cancel
        </button>` : ''}
        ${!isCancelled ? `<button class="btn-action btn-track" onclick="showToast('📦 Tracking info coming soon!')">
          <i class="fas fa-truck"></i> Track
        </button>` : ''}
        <button class="btn-action btn-reorder" onclick="reorder('${order.id}')">
          <i class="fas fa-redo"></i> Reorder
        </button>
      </div>
    </div>
  </div>`;
}

function itemRow(item) {
  const emoji = item.emoji || item.icon || '📦';
  const imgHtml = item.image
    ? `<img src="${item.image}" style="width:100%;height:100%;object-fit:cover;border-radius:8px" onerror="this.parentElement.textContent='${emoji}'">`
    : emoji;
  return `
    <div class="order-item-row">
      <div class="item-thumb">${imgHtml}</div>
      <div class="item-details">
        <div class="item-name">${item.name || item.title || 'Product'}</div>
        <div class="item-qty">Qty: ${item.quantity || item.qty || 1}</div>
      </div>
      <div class="item-price">₹${formatPrice((item.price||0) * (item.quantity||item.qty||1))}</div>
    </div>`;
}

function buildProgress(stepNum) {
  const fillPct = ((stepNum - 1) / 3) * 100;
  const stepsHtml = PROG_STAGES.map((s, i) => {
    const cls = i < stepNum - 1 ? 'done' : (i === stepNum - 1 ? 'active' : '');
    return `<div class="prog-step ${cls}">
      <div class="prog-dot"><i class="${s.icon}"></i></div>
      <div class="prog-label">${s.label}</div>
    </div>`;
  }).join('');

  return `
    <div class="delivery-progress">
      <div class="progress-steps">
        <div class="progress-fill" style="width:calc(${fillPct}% - 0px)"></div>
        ${stepsHtml}
      </div>
    </div>`;
}

// ── TOGGLE ITEMS ─────────────────────────────────────────
function toggleItems(orderId, btn) {
  const el = document.getElementById('rest-' + orderId);
  el.classList.toggle('show');
  btn.innerHTML = el.classList.contains('show')
    ? '<i class="fas fa-chevron-up me-1"></i> Show less'
    : `<i class="fas fa-chevron-down me-1"></i> +${el.children.length} more item${el.children.length > 1 ? 's' : ''}`;
}

// ── FILTER ────────────────────────────────────────────────
function filterOrders(status, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = status === 'all' ? allOrders : allOrders.filter(o => o.status === status);
  renderOrders(filtered);
}

// ── CANCEL MODAL ─────────────────────────────────────────
function openCancelModal(orderId) {
  cancelTargetId = orderId;
  document.getElementById('modalOrderId').textContent = 'ORDER #' + orderId;
  document.getElementById('cancelReason').value = '';
  document.getElementById('cancelModal').classList.add('show');
}
function closeModal() {
  document.getElementById('cancelModal').classList.remove('show');
  cancelTargetId = null;
}
function confirmCancel() {
  if (!cancelTargetId) return;
  const reason = document.getElementById('cancelReason').value;
  allOrders = allOrders.map(o => {
    if (o.id === cancelTargetId) {
      return { ...o, status: 'Cancelled', cancelReason: reason || 'Not specified' };
    }
    return o;
  });
  localStorage.setItem('prokart_orders', JSON.stringify(allOrders));
  closeModal();
  renderStats();
  renderOrders(allOrders);
  showToast('❌ Order cancelled successfully');
}

// ── REORDER ───────────────────────────────────────────────
function reorder(orderId) {
  const order = allOrders.find(o => o.id === orderId);
  if (!order || !order.items) { showToast('⚠️ Could not reorder'); return; }
  localStorage.setItem('prokart_cart', JSON.stringify(order.items));
  showToast('🛒 Items added to cart!');
  setTimeout(() => window.location.href = 'index.html#products', 1200);
}

// ── HELPERS ───────────────────────────────────────────────
function formatPrice(n) { return Number(n).toLocaleString('en-IN'); }
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Close modal on overlay click
document.getElementById('cancelModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// ── INIT ──────────────────────────────────────────────────
loadOrders();
</script>
</body>
</html>
