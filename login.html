<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ProKart - Login</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg-dark: #080c14;
    --bg-card: #0e1420;
    --accent: #00e5ff;
    --accent2: #7b2fff;
    --text: #e8eaf6;
    --text-muted: #8892a4;
    --border: rgba(0,229,255,0.12);
    --glow: 0 0 24px rgba(0,229,255,0.18);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-dark);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background-image:
      radial-gradient(ellipse 60% 60% at 70% 50%, rgba(123,47,255,0.1) 0%, transparent 70%),
      radial-gradient(ellipse 50% 50% at 30% 60%, rgba(0,229,255,0.06) 0%, transparent 70%);
  }

  .login-wrapper {
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }

  .brand {
    text-align: center;
    margin-bottom: 32px;
  }

  .brand-name {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 2rem;
    color: var(--accent);
    letter-spacing: 3px;
    text-decoration: none;
    display: block;
  }

  .brand-name span { color: var(--accent2); }
  .brand-sub { color: var(--text-muted); font-size: 0.85rem; margin-top: 6px; }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    box-shadow: var(--glow);
  }

  .tabs {
    display: flex;
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    padding: 4px;
    margin-bottom: 28px;
  }

  .tab {
    flex: 1;
    padding: 10px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.88rem;
    cursor: pointer;
    border-radius: 8px;
    transition: all 0.2s;
  }

  .tab.active {
    background: rgba(0,229,255,0.1);
    color: var(--accent);
    border: 1px solid rgba(0,229,255,0.2);
  }

  .form-group {
    margin-bottom: 18px;
  }

  .form-label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .input-wrap {
    position: relative;
  }

  .input-wrap i {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 0.9rem;
  }

  .form-input {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px 12px 40px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    outline: none;
    transition: all 0.2s;
  }

  .form-input:focus {
    border-color: rgba(0,229,255,0.4);
    box-shadow: 0 0 16px rgba(0,229,255,0.1);
  }

  .form-input::placeholder { color: var(--text-muted); }

  .forgot {
    text-align: right;
    margin-top: 6px;
  }

  .forgot a {
    color: var(--accent);
    font-size: 0.78rem;
    text-decoration: none;
    opacity: 0.8;
    transition: opacity 0.2s;
  }

  .forgot a:hover { opacity: 1; }

  .btn-submit {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), #00b8d9);
    color: var(--bg-dark);
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 0.95rem;
    letter-spacing: 1px;
    cursor: pointer;
    margin-top: 24px;
    box-shadow: 0 0 24px rgba(0,229,255,0.25);
    transition: all 0.2s;
    text-transform: uppercase;
  }

  .btn-submit:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 40px rgba(0,229,255,0.4);
  }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
    color: var(--text-muted);
    font-size: 0.78rem;
  }

  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .social-btns {
    display: flex;
    gap: 10px;
  }

  .btn-social {
    flex: 1;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px;
    color: var(--text-muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: all 0.2s;
  }

  .btn-social:hover {
    border-color: rgba(0,229,255,0.3);
    color: var(--text);
  }

  .error-msg {
    background: rgba(229,57,53,0.1);
    border: 1px solid rgba(229,57,53,0.3);
    color: #ef5350;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.82rem;
    margin-bottom: 16px;
    display: none;
  }

  .success-msg {
    background: rgba(0,229,255,0.08);
    border: 1px solid rgba(0,229,255,0.2);
    color: var(--accent);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 0.82rem;
    margin-bottom: 16px;
    display: none;
  }

  .back-home {
    text-align: center;
    margin-top: 20px;
  }

  .back-home a {
    color: var(--text-muted);
    font-size: 0.82rem;
    text-decoration: none;
    transition: color 0.2s;
  }

  .back-home a:hover { color: var(--accent); }
  .back-home i { margin-right: 6px; }

  .form-section { display: none; }
  .form-section.active { display: block; }
</style>
</head>
<body>

<div class="login-wrapper">
  <div class="brand">
    <a href="index.html" class="brand-name">KART<span>PRO</span></a>
    <p class="brand-sub">Welcome back to ProKart</p>
  </div>

  <div class="card">
    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Login</button>
      <button class="tab" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Error/Success -->
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>

    <!-- LOGIN FORM -->
    <div class="form-section active" id="loginForm">
      <div class="form-group">
        <label class="form-label">Email</label>
        <div class="input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" class="form-input" id="loginEmail" placeholder="your@email.com">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" class="form-input" id="loginPassword" placeholder="••••••••">
        </div>
        <div class="forgot"><a href="#">Forgot password?</a></div>
      </div>
      <button class="btn-submit" onclick="handleLogin()">
        <i class="fas fa-sign-in-alt me-2"></i> Login
      </button>
      <div class="divider">or continue with</div>
      <div class="social-btns">
        <button class="btn-social"><i class="fab fa-google"></i> Google</button>
        <button class="btn-social"><i class="fab fa-github"></i> GitHub</button>
      </div>
    </div>

    <!-- SIGNUP FORM -->
    <div class="form-section" id="signupForm">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <div class="input-wrap">
          <i class="fas fa-user"></i>
          <input type="text" class="form-input" id="signupName" placeholder="Mujahid Shaikh">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <div class="input-wrap">
          <i class="fas fa-envelope"></i>
          <input type="email" class="form-input" id="signupEmail" placeholder="your@email.com">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-wrap">
          <i class="fas fa-lock"></i>
          <input type="password" class="form-input" id="signupPassword" placeholder="••••••••">
        </div>
      </div>
      <button class="btn-submit" onclick="handleSignup()">
        <i class="fas fa-user-plus me-2"></i> Create Account
      </button>
      <div class="divider">or continue with</div>
      <div class="social-btns">
        <button class="btn-social"><i class="fab fa-google"></i> Google</button>
        <button class="btn-social"><i class="fab fa-github"></i> GitHub</button>
      </div>
    </div>
  </div>

  <div class="back-home">
    <a href="index.html"><i class="fas fa-arrow-left"></i> Back to ProKart</a>
  </div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.form-section').forEach(f => f.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById(tab + 'Form').classList.add('active');
  hideMessages();
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('successMsg').style.display = 'none';
}

function showSuccess(msg) {
  const el = document.getElementById('successMsg');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('errorMsg').style.display = 'none';
}

function hideMessages() {
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('successMsg').style.display = 'none';
}

function handleLogin() {
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;

  if (!email || !password) {
    showError('Please fill in all fields!');
    return;
  }

  // Demo login
  const users = JSON.parse(localStorage.getItem('prokart_users') || '[]');
  const user = users.find(u => u.email === email && u.password === password);

  if (user) {
    localStorage.setItem('prokart_logged_in', JSON.stringify(user));
    showSuccess('Login successful! Redirecting...');
    setTimeout(() => window.location.href = 'index.html', 1500);
  } else {
    showError('Invalid email or password!');
  }
}

function handleSignup() {
  const name = document.getElementById('signupName').value;
  const email = document.getElementById('signupEmail').value;
  const password = document.getElementById('signupPassword').value;

  if (!name || !email || !password) {
    showError('Please fill in all fields!');
    return;
  }

  if (password.length < 6) {
    showError('Password must be at least 6 characters!');
    return;
  }

  const users = JSON.parse(localStorage.getItem('prokart_users') || '[]');

  if (users.find(u => u.email === email)) {
    showError('Email already registered!');
    return;
  }

  users.push({ name, email, password });
  localStorage.setItem('prokart_users', JSON.stringify(users));
  localStorage.setItem('prokart_logged_in', JSON.stringify({ name, email }));

  showSuccess('Account created! Redirecting...');
  setTimeout(() => window.location.href = 'index.html', 1500);
}
</script>
</body>
</html>
